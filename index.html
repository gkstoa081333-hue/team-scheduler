<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>팀 스케줄러 — 공주시정신건강복지센터</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Firebase v10 compat (최신 안정) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
/* ═══════════════════════════════════════
   Apple Human Interface Tokens
═══════════════════════════════════════ */
:root[data-theme="light"] {
  --bg:           #FFFFFF;
  --bg-elev:      #F5F5F7;
  --bg-elev2:     #FAFAFC;
  --surface:      rgba(0,0,0,0.04);
  --surface-hi:   rgba(0,0,0,0.08);
  --border:       rgba(0,0,0,0.08);
  --border-hi:    rgba(0,0,0,0.14);
  --sidebar-bg:   #000000;
  --sidebar-text: rgba(255,255,255,0.85);
  --sidebar-faint:rgba(255,255,255,0.4);
  --sidebar-hover:rgba(255,255,255,0.08);
  --sidebar-pill: rgba(255,255,255,0.12);

  --accent:       #0071E3;
  --accent-hover: #0077ED;
  --accent-dim:   rgba(0,113,227,0.1);

  --text:         #1D1D1F;
  --text-muted:   #6E6E73;
  --text-faint:   #A1A1A6;

  --danger:       #FF3B30;
  --danger-dim:   rgba(255,59,48,0.1);
  --success:      #30D158;
  --warning:      #FF9500;

  --shadow-sm:    0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-lg:    0 12px 32px rgba(0,0,0,0.12), 0 4px 12px rgba(0,0,0,0.06);
  --shadow-xl:    0 24px 64px rgba(0,0,0,0.18), 0 8px 24px rgba(0,0,0,0.08);

  --toolbar-bg:   rgba(255,255,255,0.78);
}
:root[data-theme="dark"] {
  --bg:           #1C1C1E;
  --bg-elev:      #2C2C2E;
  --bg-elev2:     #242427;
  --surface:      rgba(255,255,255,0.06);
  --surface-hi:   rgba(255,255,255,0.1);
  --border:       rgba(255,255,255,0.08);
  --border-hi:    rgba(255,255,255,0.16);
  --sidebar-bg:   #000000;
  --sidebar-text: rgba(255,255,255,0.85);
  --sidebar-faint:rgba(255,255,255,0.4);
  --sidebar-hover:rgba(255,255,255,0.08);
  --sidebar-pill: rgba(255,255,255,0.12);

  --accent:       #0A84FF;
  --accent-hover: #1A8FFF;
  --accent-dim:   rgba(10,132,255,0.18);

  --text:         #F5F5F7;
  --text-muted:   #98989D;
  --text-faint:   #636366;

  --danger:       #FF453A;
  --danger-dim:   rgba(255,69,58,0.18);
  --success:      #30D158;
  --warning:      #FF9F0A;

  --shadow-sm:    0 1px 3px rgba(0,0,0,0.4);
  --shadow-md:    0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg:    0 12px 32px rgba(0,0,0,0.5);
  --shadow-xl:    0 24px 64px rgba(0,0,0,0.7);

  --toolbar-bg:   rgba(28,28,30,0.78);
}

/* ── Shape, Spacing, Type ── */
:root {
  --r-xs:  4px;
  --r-sm:  8px;
  --r-md:  10px;
  --r-lg:  14px;
  --r-xl:  20px;
  --r-pill:9999px;

  --sb-w:   232px;
  --nav-h:  52px;
  --sab:    env(safe-area-inset-bottom, 0px);
  --sat:    env(safe-area-inset-top, 0px);

  --font-display: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-body:    'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ── Reset ── */
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  height: 100%;
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
body { overflow: hidden; }
button, input, select, textarea { font-family: inherit; cursor: pointer; color: inherit; }
input, select, textarea { cursor: text; }

/* ═══════════════════════════════════════
   App Shell
═══════════════════════════════════════ */
#app { display: flex; height: 100dvh; overflow: hidden; }

/* ═══════════════════════════════════════
   Sidebar — Apple Black Bar
═══════════════════════════════════════ */
#sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  z-index: 150;
}

.sb-brand {
  padding: 22px 20px 18px;
  padding-top: calc(var(--sat) + 22px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.sb-brand .org {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 500;
  color: var(--sidebar-faint);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.sb-brand .app-name {
  font-size: 17px; font-weight: 700;
  color: #fff;
  letter-spacing: -0.4px;
}
.sb-brand .pulse {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 500;
  color: var(--success);
  background: rgba(48,209,88,0.12);
  border-radius: var(--r-pill);
  padding: 3px 8px;
  margin-top: 8px;
}
.sb-brand .pulse::before {
  content:''; width:5px; height:5px; border-radius:50%;
  background: var(--success);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.9)} }

.sb-body { flex: 1; overflow-y: auto; padding: 12px 10px; -webkit-overflow-scrolling: touch; }
.sb-foot { padding: 10px; border-top: 1px solid rgba(255,255,255,0.08); flex-shrink: 0; }

.sb-section {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 600;
  color: var(--sidebar-faint);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin: 14px 10px 6px;
}
.sb-section:first-child { margin-top: 4px; }

.mb-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--r-sm);
  cursor: pointer; margin-bottom: 1px;
  transition: background .15s;
  user-select: none;
}
.mb-item:hover { background: var(--sidebar-hover); }
.mb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mb-name { font-size: 13px; color: var(--sidebar-text); flex: 1; letter-spacing: -0.1px; }
.mb-cnt {
  font-size: 11px; color: var(--sidebar-faint);
  background: var(--sidebar-pill);
  border-radius: var(--r-pill);
  padding: 1px 7px; font-weight: 500;
}
.mb-item.dim .mb-name, .mb-item.dim .mb-dot { opacity: 0.35; }

.cat-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px; border-radius: var(--r-sm);
  cursor: pointer; margin-bottom: 1px;
  transition: background .15s; user-select: none;
}
.cat-item:hover { background: var(--sidebar-hover); }
.cat-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
.cat-name { font-size: 12px; color: rgba(255,255,255,0.7); flex: 1; }
.cat-item.dim .cat-name, .cat-item.dim .cat-dot { opacity: 0.35; }

.sb-btn {
  width: 100%; padding: 8px 12px;
  border-radius: var(--r-sm);
  border: 1px solid rgba(255,255,255,0.15);
  background: transparent;
  font-size: 12px; font-weight: 400;
  color: rgba(255,255,255,0.75);
  text-align: left;
  margin-bottom: 5px;
  transition: all .15s;
}
.sb-btn:hover { background: rgba(255,255,255,0.06); color: #fff; }

/* ═══════════════════════════════════════
   Main
═══════════════════════════════════════ */
#main {
  flex: 1; display: flex; flex-direction: column;
  min-width: 0; height: 100dvh; overflow: hidden;
  background: var(--bg);
}

/* ═══════════════════════════════════════
   Toolbar
═══════════════════════════════════════ */
#toolbar {
  height: var(--nav-h);
  min-height: var(--nav-h);
  flex-shrink: 0;
  background: var(--toolbar-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
}

#menu-btn {
  display: none; background: none; border: none;
  width: 32px; height: 32px; border-radius: var(--r-sm);
  font-size: 18px; color: var(--text);
  align-items: center; justify-content: center;
}

.nav-arrow {
  background: none; border: none;
  width: 30px; height: 30px;
  border-radius: var(--r-sm);
  font-size: 18px; color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.nav-arrow:hover { background: var(--accent-dim); }
.nav-arrow:active { transform: scale(0.9); }

#nav-center {
  display: flex; align-items: center; gap: 2px;
  flex: 1; justify-content: center;
}

#ym-wrap { display: flex; align-items: center; gap: 0; }
.ym-select {
  border: none; background: transparent;
  font-family: var(--font-display);
  font-size: 15px; font-weight: 600;
  color: var(--text); cursor: pointer;
  appearance: none; -webkit-appearance: none;
  padding: 5px 6px; border-radius: var(--r-sm);
  letter-spacing: -0.3px;
  transition: background .15s;
}
.ym-select:hover, .ym-select:focus { background: var(--surface); outline: none; }
.ym-select option { background: var(--bg); color: var(--text); }

#week-label {
  font-size: 14px; font-weight: 600;
  color: var(--text); padding: 0 6px; white-space: nowrap;
}

#toolbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

#today-btn {
  background: transparent; border: none;
  color: var(--accent);
  font-size: 13px; font-weight: 500;
  padding: 5px 11px; border-radius: var(--r-pill);
  transition: background .15s;
}
#today-btn:hover { background: var(--accent-dim); }

.vt {
  display: flex;
  background: var(--surface);
  border-radius: var(--r-pill);
  padding: 2px; gap: 1px;
}
.vt-btn {
  padding: 4px 12px; border-radius: var(--r-pill);
  border: none; background: transparent;
  font-size: 12px; font-weight: 600;
  color: var(--text-muted);
  transition: all .15s;
}
.vt-btn.on {
  background: var(--bg);
  color: var(--text);
  box-shadow: var(--shadow-sm);
}

.icon-btn {
  background: none; border: none;
  width: 32px; height: 32px;
  border-radius: var(--r-sm);
  font-size: 15px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s;
}
.icon-btn:hover { background: var(--surface); color: var(--text); }

#add-btn {
  background: var(--accent); color: #fff;
  border: none; border-radius: var(--r-pill);
  padding: 7px 14px;
  font-size: 13px; font-weight: 500;
  letter-spacing: -0.1px;
  transition: all .15s;
  box-shadow: var(--shadow-sm);
}
#add-btn:hover { background: var(--accent-hover); }
#add-btn:active { transform: scale(0.96); }

/* ═══════════════════════════════════════
   Calendar
═══════════════════════════════════════ */
#cal { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* Month */
#mv { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.dow-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.dow-cell {
  text-align: center; padding: 9px 2px;
  font-family: var(--font-display);
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.4px;
  text-transform: uppercase;
}
.dow-cell:first-child { color: var(--danger); }
.dow-cell:last-child { color: var(--accent); }

.month-grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: minmax(72px, 1fr);
  overflow: hidden;
  min-height: 0;
}

.dc {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px 5px 4px;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
  cursor: pointer;
  min-height: 0;
  transition: background .12s;
}
.dc:hover { background: var(--bg-elev2); }
.dc:nth-child(7n) { border-right: none; }
.dc.other { background: var(--bg-elev); }
.dc.other .dn { color: var(--text-faint); }
.dc.sun .dn { color: var(--danger); }
.dc.sat .dn { color: var(--accent); }

.dn {
  font-family: var(--font-display);
  font-size: 12px; font-weight: 500;
  line-height: 1; margin-bottom: 4px;
  color: var(--text);
  flex-shrink: 0;
}
.dn-today {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-weight: 600; font-size: 12px;
}

.ev-chip {
  font-size: 10px; font-weight: 600;
  border-radius: 4px;
  padding: 2px 5px;
  margin-bottom: 2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; flex-shrink: 0;
  letter-spacing: -0.1px;
  transition: filter .12s;
}
.ev-chip:hover { filter: brightness(1.08); }
.more-lbl {
  font-size: 10px; color: var(--accent);
  flex-shrink: 0; padding: 0 3px;
  font-weight: 600;
}

/* Week */
#wv { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.wk-head {
  display: flex; background: var(--bg);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.wk-gut { width: 44px; flex-shrink: 0; }
.wk-dc {
  flex: 1; border-left: 1px solid var(--border);
  text-align: center; padding: 8px 2px;
}
.wk-dc .wdn {
  font-family: var(--font-display);
  font-size: 10px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.4px; text-transform: uppercase;
}
.wk-dc .wdd {
  font-family: var(--font-display);
  font-size: 17px; font-weight: 600;
  margin-top: 3px; color: var(--text);
  letter-spacing: -0.4px;
}
.wk-dc.today .wdd {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent); color: #fff;
}
.wk-dc.sun .wdd { color: var(--danger); }
.wk-dc.sat .wdd { color: var(--accent); }

.ad-row {
  display: flex;
  background: var(--bg-elev2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; min-height: 24px;
}
.ad-gut {
  width: 44px; font-size: 9px;
  color: var(--text-muted);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 6px; flex-shrink: 0;
}
.ad-cols { flex: 1; display: flex; }
.ad-col {
  flex: 1; padding: 2px 3px;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 1px;
  overflow: hidden;
}
.ad-chip {
  font-size: 10px; font-weight: 600;
  border-radius: 4px;
  padding: 2px 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer;
}

.wk-body { flex: 1; overflow-y: auto; display: flex; min-height: 0; -webkit-overflow-scrolling: touch; }
.wk-tcol { width: 44px; flex-shrink: 0; position: relative; }
.t-lbl {
  position: absolute; right: 6px;
  font-family: var(--font-display);
  font-size: 9px; color: var(--text-muted);
  transform: translateY(-50%);
  line-height: 1; white-space: nowrap;
}
.wk-days { flex: 1; display: flex; position: relative; }
.wk-lane {
  flex: 1; border-left: 1px solid var(--border);
  position: relative;
}
.wk-lane.today-bg { background: rgba(10,132,255,0.03); }
:root[data-theme="light"] .wk-lane.today-bg { background: rgba(0,113,227,0.025); }
.h-line {
  position: absolute; left: 0; right: 0;
  border-top: 1px solid var(--border);
  pointer-events: none;
}
.h-half {
  position: absolute; left: 0; right: 0;
  border-top: 1px dashed var(--border);
  opacity: 0.4; pointer-events: none;
}
.now-line {
  position: absolute; left: 0; right: 0;
  border-top: 2px solid var(--accent);
  pointer-events: none; z-index: 5;
}
.now-dot {
  position: absolute; left: -4px; top: -4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}

.wk-ev {
  position: absolute; border-radius: 6px;
  padding: 3px 6px;
  font-size: 11px; font-weight: 600;
  overflow: hidden; cursor: pointer;
  left: 2px; right: 2px; z-index: 3;
  border-left: 3px solid rgba(0,0,0,0.15);
  letter-spacing: -0.1px;
  transition: filter .1s;
}
.wk-ev:hover { filter: brightness(1.08); }
.wk-ev-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wk-ev-time { font-size: 9px; opacity: 0.7; font-weight: 400; }

/* ═══════════════════════════════════════
   Popup
═══════════════════════════════════════ */
#popup {
  position: fixed;
  background: var(--bg);
  border-radius: var(--r-xl);
  box-shadow: var(--shadow-xl);
  width: 296px; z-index: 300;
  display: none;
  border: 1px solid var(--border);
  overflow: hidden;
}
#popup.on { display: block; animation: popIn .15s cubic-bezier(.4,0,.2,1); }
@keyframes popIn { from{opacity:0;transform:scale(0.94)} to{opacity:1;transform:scale(1)} }
.pp-bar { height: 4px; }
.pp-body { padding: 14px 16px; }
.pp-title {
  font-size: 15px; font-weight: 600;
  margin-bottom: 8px; color: var(--text);
  letter-spacing: -0.2px;
}
.pp-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 13px; color: var(--text-muted);
  margin-top: 5px;
  letter-spacing: -0.1px;
}
.pp-icon { font-size: 13px; flex-shrink: 0; line-height: 1.5; }
.pp-acts {
  display: flex; gap: 6px;
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg-elev2);
}
.pp-btn {
  flex: 1; padding: 7px;
  border-radius: var(--r-sm);
  font-size: 13px; font-weight: 600;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text-muted);
  transition: all .12s;
}
.pp-btn:hover { background: var(--surface); }
.pp-edit { color: var(--accent); border-color: rgba(10,132,255,0.25); background: var(--accent-dim); }
.pp-del { color: var(--danger); border-color: rgba(255,59,48,0.2); background: var(--danger-dim); }

/* ═══════════════════════════════════════
   Modal Overlay & Sheet
═══════════════════════════════════════ */
.ov {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: flex-end; justify-content: center;
  z-index: 200;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.ov.on { display: flex; }
@media (min-width: 641px) {
  .ov { align-items: center; padding: 20px; }
}

.modal {
  background: var(--bg);
  border-radius: 22px 22px 0 0;
  width: 100%; max-width: 460px;
  display: flex; flex-direction: column;
  max-height: 92dvh; overflow: hidden;
  animation: slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
@media (min-width: 641px) {
  .modal { border-radius: var(--r-xl); max-height: 88vh; animation: popIn .2s cubic-bezier(.4,0,.2,1); border: 1px solid var(--border); }
}

.mh {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mh h3 {
  font-size: 16px; font-weight: 600;
  color: var(--text); letter-spacing: -0.3px;
}
.mc-btn {
  background: var(--surface); border: none;
  border-radius: 50%; width: 28px; height: 28px;
  font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: all .12s;
}
.mc-btn:hover { background: var(--surface-hi); color: var(--text); }

.mb-section {
  padding: 14px 20px;
  display: flex; flex-direction: column;
  gap: 12px;
}

.mb-list {
  padding: 12px 20px 16px;
  overflow-y: auto; flex: 1;
  border-top: 1px solid var(--border);
  background: var(--bg-elev);
}
.mb-list-title {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.3px; text-transform: uppercase;
  margin-bottom: 8px;
}

.mf {
  padding: 12px 20px;
  border-top: 1px solid var(--border);
  display: flex; gap: 8px;
  flex-shrink: 0;
  background: var(--bg);
}

/* Form */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-family: var(--font-display);
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  letter-spacing: 0.3px; text-transform: uppercase;
}
.field input, .field select, .field textarea {
  padding: 10px 13px;
  border: 1px solid var(--border-hi);
  border-radius: var(--r-md);
  font-size: 15px; font-weight: 400;
  color: var(--text);
  background: var(--bg-elev);
  letter-spacing: -0.2px;
  transition: all .15s;
  appearance: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--bg);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field select option { background: var(--bg); color: var(--text); }
.field textarea { resize: vertical; min-height: 64px; cursor: text; }

.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.chk-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 14px;
  color: var(--text); cursor: pointer;
}
.chk-row input { width: 16px; height: 16px; accent-color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 5px;
  padding: 10px 18px;
  border-radius: var(--r-pill);
  font-size: 14px; font-weight: 500;
  border: 1px solid transparent;
  letter-spacing: -0.1px;
  transition: all .15s;
}
.btn:active { transform: scale(0.97); }
.btn-p { background: var(--accent); color: #fff; }
.btn-p:hover { background: var(--accent-hover); }
.btn-o { background: var(--surface); color: var(--text); }
.btn-o:hover { background: var(--surface-hi); }
.btn-d { background: var(--danger-dim); color: var(--danger); }
.btn-f { width: 100%; }

/* Swatches */
.swatches { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
.sw {
  width: 28px; height: 28px;
  border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent;
  transition: all .15s;
}
.sw:hover { transform: scale(1.08); }
.sw.on { border-color: var(--bg); box-shadow: 0 0 0 2px var(--text); }

/* Member row in list */
.mem-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--r-sm);
  background: var(--bg);
  border: 1px solid var(--border);
  margin-bottom: 5px;
}
.mem-row .dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.mem-row .name {
  flex: 1; font-size: 14px;
  color: var(--text); letter-spacing: -0.2px;
}
.mem-row button {
  background: none; border: none;
  color: var(--danger);
  font-size: 12px;
  padding: 4px 8px;
  border-radius: var(--r-sm);
  transition: background .15s;
}
.mem-row button:hover { background: var(--danger-dim); }

.empty-msg {
  text-align: center;
  padding: 24px 12px;
  font-size: 13px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════
   Toast
═══════════════════════════════════════ */
#toast {
  position: fixed;
  bottom: calc(var(--sab) + 20px);
  left: 50%;
  transform: translate(-50%, 12px);
  background: var(--text);
  color: var(--bg);
  border-radius: var(--r-pill);
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: -0.1px;
  opacity: 0;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  z-index: 500;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
}
#toast.on { opacity: 1; transform: translate(-50%, 0); }
#toast.err { background: var(--danger); color: #fff; }

/* ═══════════════════════════════════════
   Loading
═══════════════════════════════════════ */
#loading {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 9999;
}
#loading .spin {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 3px solid var(--surface);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
#loading p { font-size: 13px; color: var(--text-muted); }
#loading.hidden { display: none; }

/* ═══════════════════════════════════════
   Search Overlay
═══════════════════════════════════════ */
#search-ov {
  position: fixed; top: 0; left: 0; right: 0;
  z-index: 400;
  display: none;
  background: var(--toolbar-bg);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px;
  padding-top: calc(var(--sat) + 10px);
  align-items: center; gap: 8px;
}
#search-ov.on { display: flex; }
#search-ov input {
  flex: 1; padding: 9px 14px;
  border: 1px solid var(--border-hi);
  border-radius: var(--r-pill);
  font-size: 14px; outline: none;
  background: var(--bg);
  color: var(--text);
}
#search-ov input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
#search-cancel {
  background: none; border: none;
  color: var(--accent);
  font-size: 14px; font-weight: 500;
  padding: 6px 8px; white-space: nowrap;
}

/* ═══════════════════════════════════════
   Mobile
═══════════════════════════════════════ */

const COLORS = ['#0071E3','#30D158','#FF9500','#FF3B30','#BF5AF2','#FF375F','#5AC8FA','#FFD60A','#5856D6','#AF52DE'];
const CATS = {
  education: {l:'교육',           i:'📚', c:'#5AC8FA', bg:'rgba(90,200,250,0.12)'},
  case:      {l:'사례관리',       i:'🗂', c:'#30D158', bg:'rgba(48,209,88,0.12)'},
  duty:      {l:'당직근무',       i:'🌙', c:'#FF9500', bg:'rgba(255,149,0,0.12)'},

  personal:  {l:'개인일정',       i:'🧍', c:'#FF3B30', bg:'rgba(255,59,48,0.12)'},

};
const REP = {none:'없음',daily:'매일',weekly:'매주',monthly:'매월',yearly:'매년'};
const HOUR_H = 54;
const MIN_YEAR = 2020, MAX_YEAR = 2032;

let members = [];
let events = [];
let hiddenCats = JSON.parse(localStorage.getItem('ts_hidden_cats') || '[]');
let curDate = new Date();
let curView = 'month';
let editId = null;
let popupId = null;

/* ─────────────────────────────────
   유틸
───────────────────────────────── */
function dStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function pDate(s) { if(!s)return null; const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function weekStart(d) { const w=new Date(d); w.setDate(d.getDate()-d.getDay()); return w; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getMember(id) { return members.find(m=>m.id===id) || null; }
function getEvColor(ev) { const m=getMember(ev.memberId); return m ? m.color : (CATS[ev.cat]?.c || '#0071E3'); }
function getEvBg(ev) {
  const m=getMember(ev.memberId);
  if (m) return m.color + '22';
  return CATS[ev.cat]?.bg || 'rgba(0,113,227,0.12)';
}

function occursOn(ev, d) {
  const ds = dStr(d);
  const start = ev.startDate || '';
  const end = ev.endDate || start;
  const rep = ev.repeat || 'none';
  if (rep === 'none') return ds >= start && ds <= end;
  if (ds < start) return false;
  if (rep === 'daily') return true;
  if (rep === 'weekly') { const sd=pDate(start); return d.getDay()===sd.getDay(); }
  if (rep === 'monthly') { const sd=pDate(start); return d.getDate()===sd.getDate(); }
  if (rep === 'yearly') { const sd=pDate(start); return d.getMonth()===sd.getMonth()&&d.getDate()===sd.getDate(); }
  return false;
}

/* ─────────────────────────────────
   Toast
───────────────────────────────── */
let toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'on' + (type==='err' ? ' err' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('on'), 1800);
}

/* ─────────────────────────────────
   Firebase 구독
───────────────────────────────── */
function subscribeAll() {
  if (!db) {
    toast('Firebase 연결 실패', 'err');
    return;
  }
  db.ref(`${ROOT}/members`).on('value', snap => {
    members = [];
    snap.forEach(child => {
      members.push({ id: child.key, ...child.val() });
    });
    renderSidebar();
    render();
    // 멤버 관리 모달이 열려있으면 목록 갱신
    if (document.getElementById('mem-modal').classList.contains('on')) {
      renderMemberList();
    }
  }, err => {
    console.error('members 동기화 오류:', err);
    toast('팀원 동기화 오류', 'err');
  });

  db.ref(`${ROOT}/events`).on('value', snap => {
    events = [];
    snap.forEach(child => {
      events.push({ id: child.key, ...child.val() });
    });
    render();
  }, err => {
    console.error('events 동기화 오류:', err);
    toast('일정 동기화 오류', 'err');
  });
}

   Sidebar
───────────────────────────────── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-ov').classList.toggle('on');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-ov').classList.remove('on');
}

function renderSidebar() {
  // 팀원
  let mh = '';
  members.forEach(m => {
    const cnt = events.filter(e => e.memberId === m.id).length;
    mh += `<div class="mb-item${m.hidden?' dim':''}" onclick="toggleMember('${m.id}')">
      <div class="mb-dot" style="background:${m.color}"></div>
      <div class="mb-name">${esc(m.name)}</div>
      <div class="mb-cnt">${cnt}</div>
    </div>`;
  });
  document.getElementById('mb-list').innerHTML = mh;

  // 카테고리
  let ch = '';
  for (const key in CATS) {
    const info = CATS[key];
    const dim = hiddenCats.includes(key);
    ch += `<div class="cat-item${dim?' dim':''}" onclick="toggleCat('${key}')">
      <div class="cat-dot" style="background:${info.c}"></div>
      <div class="cat-name">${info.i} ${info.l}</div>
    </div>`;
  }
  document.getElementById('cat-list').innerHTML = ch;

  // 이벤트 모달의 담당자 셀렉트
  const ms = document.getElementById('ev-member');
  if (ms) {
    const prev = ms.value;
    let html = '<option value="">미지정</option>';
    members.forEach(m => html += `<option value="${m.id}">${esc(m.name)}</option>`);
    ms.innerHTML = html;
    if (prev) ms.value = prev;
  }
}

function toggleMember(id) {
  const m = members.find(x => x.id === id);
  if (!m) return;
  db.ref(`${ROOT}/members/${id}/hidden`).set(!m.hidden);
}
function toggleCat(key) {
  const idx = hiddenCats.indexOf(key);
  if (idx >= 0) hiddenCats.splice(idx, 1); else hiddenCats.push(key);
  localStorage.setItem('ts_hidden_cats', JSON.stringify(hiddenCats));
  renderSidebar();
  render();
}

/* ─────────────────────────────────
   Visibility
───────────────────────────────── */
function isVisible(ev) {
  if (hiddenCats.includes(ev.cat)) return false;
  const m = getMember(ev.memberId);
  if (m && m.hidden) return false;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    const inT = (ev.title||'').toLowerCase().includes(q);
    const inMemo = (ev.memo||'').toLowerCase().includes(q);
    const inM = m ? m.name.toLowerCase().includes(q) : false;
    const cat = CATS[ev.cat];
    const inC = cat ? cat.l.toLowerCase().includes(q) : false;
    if (!inT && !inMemo && !inM && !inC) return false;
  }
  return true;
}

/* ─────────────────────────────────
   Navigation
───────────────────────────────── */
function buildYearOptions() {
  const sel = document.getElementById('sel-year');
  sel.innerHTML = '';
  for (let y = MIN_YEAR; y <= MAX_YEAR; y++) {
    const o = document.createElement('option');
    o.value = y;
    o.textContent = y + '년';
    sel.appendChild(o);
  }
  sel.value = curDate.getFullYear();
}
function syncSelectors() {
  const selY = document.getElementById('sel-year');
  const selM = document.getElementById('sel-month');
  const ymWrap = document.getElementById('ym-wrap');
  const wkLbl = document.getElementById('week-label');
  if (curView === 'month') {
    ymWrap.style.display = 'flex';
    wkLbl.style.display = 'none';
    if (selY.options.length) selY.value = curDate.getFullYear();
    selM.value = curDate.getMonth();
  } else {
    ymWrap.style.display = 'none';
    wkLbl.style.display = 'block';
    const ws = weekStart(curDate);
    const we = new Date(ws); we.setDate(ws.getDate()+6);
    wkLbl.textContent = curDate.getFullYear()+'년 '+(ws.getMonth()+1)+'/'+ws.getDate()+' – '+(we.getMonth()+1)+'/'+we.getDate();
  }
}
function jumpYM() {
  const y = parseInt(document.getElementById('sel-year').value, 10);
  const m = parseInt(document.getElementById('sel-month').value, 10);
  curDate = new Date(y, m, 1);
  render();
}
function nav(dir) {
  if (curView === 'month') {
    let y = curDate.getFullYear(), m = curDate.getMonth() + dir;
    if (m < 0) { y--; m = 11; }
    if (m > 11) { y++; m = 0; }
    if (y < MIN_YEAR || y > MAX_YEAR) return;
    curDate = new Date(y, m, 1);
  } else {
    const next = new Date(curDate);
    next.setDate(next.getDate() + dir * 7);
    if (next.getFullYear() < MIN_YEAR || next.getFullYear() > MAX_YEAR) return;
    curDate = next;
  }
  render();
}
function goToday() { curDate = new Date(); render(); }
function setView(v) {
  curView = v;
  document.getElementById('mv').style.display = (v==='month') ? '' : 'none';
  document.getElementById('wv').style.display = (v==='week') ? '' : 'none';
  document.getElementById('vt-month').classList.toggle('on', v==='month');
  document.getElementById('vt-week').classList.toggle('on', v==='week');
  render();
}

/* ─────────────────────────────────
   Render
───────────────────────────────── */
function render() {
  syncSelectors();
  if (curView === 'month') renderMonth();
  else renderWeek();
}

function renderMonth() {
  const grid = document.getElementById('month-grid');
  const today = new Date();
  const y = curDate.getFullYear(), mo = curDate.getMonth();
  const first = new Date(y, mo, 1), last = new Date(y, mo+1, 0);
  const startDow = first.getDay();
  const total = Math.ceil((startDow + last.getDate()) / 7) * 7;
  let html = '';
  for (let i = 0; i < total; i++) {
    const offset = i - startDow;
    const d = new Date(y, mo, 1 + offset);
    const ds = dStr(d);
    const isOther = d.getMonth() !== mo;
    const isToday = sameDay(d, today);
    const dow = d.getDay();
    const dayEvs = events.filter(ev => isVisible(ev) && occursOn(ev, d))
      .sort((a,b) => (a.startTime||'00:00') > (b.startTime||'00:00') ? 1 : -1);
    let cls = 'dc';
    if (isOther) cls += ' other';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    const dnHtml = isToday
      ? `<div class="dn"><span class="dn-today">${d.getDate()}</span></div>`
      : `<div class="dn">${d.getDate()}</div>`;
    const maxShow = 3;
    let chips = '';
    dayEvs.slice(0, maxShow).forEach(ev => {
      const col = getEvColor(ev);
      const bg = getEvBg(ev);
      chips += `<div class="ev-chip" style="color:${col};background:${bg};border-left:2px solid ${col}"
        onclick="event.stopPropagation();showPopup('${ev.id}',event)">${esc(ev.title)}</div>`;
    });
    const more = dayEvs.length - maxShow;
    if (more > 0) chips += `<div class="more-lbl">+${more}개</div>`;
    html += `<div class="${cls}" onclick="openNewEventOnDate('${ds}')">${dnHtml}${chips}</div>`;
  }
  grid.innerHTML = html;
}

function renderWeek() {
  const today = new Date();
  const ws = weekStart(curDate);
  const days = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(ws); d.setDate(ws.getDate() + i);
    days.push(d);
  }
  const WDAYS = ['일','월','화','수','목','금','토'];
  // header
  let hh = '<div class="wk-gut"></div>';
  days.forEach(d => {
    const isT = sameDay(d, today);
    let cls = 'wk-dc';
    if (isT) cls += ' today';
    if (d.getDay() === 0) cls += ' sun';
    if (d.getDay() === 6) cls += ' sat';
    hh += `<div class="${cls}"><div class="wdn">${WDAYS[d.getDay()]}</div><div class="wdd">${d.getDate()}</div></div>`;
  });
  document.getElementById('wk-head').innerHTML = hh;
  // all-day
  let adh = '';
  days.forEach(d => {
    let col = '';
    events.filter(ev => ev.allday && isVisible(ev) && occursOn(ev, d)).forEach(ev => {
      col += `<div class="ad-chip" style="color:${getEvColor(ev)};background:${getEvBg(ev)}"
        onclick="showPopup('${ev.id}',event)">${esc(ev.title)}</div>`;
    });
    adh += `<div class="ad-col">${col}</div>`;
  });
  document.getElementById('ad-cols').innerHTML = adh;
  // time column
  const totalH = 24 * HOUR_H;
  let tch = '';
  for (let h = 0; h < 24; h++) {
    const lbl = h === 0 ? '' : (h < 12 ? h+'am' : (h === 12 ? '12pm' : (h-12)+'pm'));
    tch += `<div class="t-lbl" style="top:${h*HOUR_H}px">${lbl}</div>`;
  }
  const tc = document.getElementById('wk-tcol');
  tc.style.cssText = `height:${totalH}px;position:relative`;
  tc.innerHTML = tch;
  // day columns
  let dh = '';
  days.forEach(d => {
    const ds = dStr(d);
    const isT = sameDay(d, today);
    let lines = '';
    for (let h = 0; h < 24; h++) {
      lines += `<div class="h-line" style="top:${h*HOUR_H}px"></div><div class="h-half" style="top:${h*HOUR_H+HOUR_H/2}px"></div>`;
    }
    let now = '';
    if (isT) {
      const n = new Date();
      const nowTop = Math.round(((n.getHours()*60 + n.getMinutes()) / (24*60)) * totalH);
      now = `<div class="now-line" style="top:${nowTop}px"><div class="now-dot"></div></div>`;
    }
    let evh = '';
    events.filter(ev => !ev.allday && isVisible(ev) && occursOn(ev, d)).forEach(ev => {
      const st = ev.startTime || '00:00';
      const et = ev.endTime || '01:00';
      const [sh, sm] = st.split(':').map(Number);
      const [eh, em] = et.split(':').map(Number);
      const topPx = Math.round(((sh*60+sm)/(24*60)) * totalH);
      const botPx = Math.round(((eh*60+em)/(24*60)) * totalH);
      const hPx = Math.max(24, botPx - topPx);
      const mem = getMember(ev.memberId);
      evh += `<div class="wk-ev" style="top:${topPx}px;height:${hPx}px;background:${getEvBg(ev)};border-left-color:${getEvColor(ev)};color:${getEvColor(ev)}"
        onclick="event.stopPropagation();showPopup('${ev.id}',event)">
        <div class="wk-ev-title">${esc(ev.title)}</div>
        ${hPx > 32 ? `<div class="wk-ev-time">${st}${mem?' · '+esc(mem.name):''}</div>` : ''}
      </div>`;
    });
    dh += `<div class="wk-lane${isT?' today-bg':''}" style="height:${totalH}px;position:relative" data-date="${ds}">${lines}${now}${evh}</div>`;
  });
  document.getElementById('wk-days').innerHTML = dh;
  const body = document.getElementById('wk-body');
  if (!body._scrolled) {
    body.scrollTop = Math.max(0, (new Date().getHours()-1) * HOUR_H);
    body._scrolled = true;
  }
}

/* ─────────────────────────────────
   Popup
───────────────────────────────── */
function showPopup(id, e) {
  const ev = events.find(x => x.id === id);
  if (!ev) return;
  popupId = id;
  const col = getEvColor(ev);
  const mem = getMember(ev.memberId);
  const cat = CATS[ev.cat];
  document.getElementById('pp-bar').style.background = col;
  document.getElementById('pp-title').textContent = ev.title || '';
  let dateStr = (ev.startDate || '').replace(/-/g, '/');
  if (ev.endDate && ev.endDate !== ev.startDate) dateStr += ' ~ ' + ev.endDate.replace(/-/g, '/');
  document.getElementById('pp-date').textContent = dateStr;
  const timeR = document.getElementById('pp-time-r');
  if (ev.allday) timeR.style.display = 'none';
  else { timeR.style.display = ''; document.getElementById('pp-time').textContent = (ev.startTime||'') + ' – ' + (ev.endTime||''); }
  const memR = document.getElementById('pp-mem-r');
  if (mem) { memR.style.display = ''; document.getElementById('pp-mem').textContent = mem.name; }
  else memR.style.display = 'none';
  const catR = document.getElementById('pp-cat-r');
  if (cat) { catR.style.display = ''; document.getElementById('pp-cat').textContent = cat.i + ' ' + cat.l; }
  else catR.style.display = 'none';
  const repR = document.getElementById('pp-rep-r');
  if (ev.repeat && ev.repeat !== 'none') { repR.style.display = ''; document.getElementById('pp-rep').textContent = REP[ev.repeat] || ''; }
  else repR.style.display = 'none';
  const memoR = document.getElementById('pp-memo-r');
  if (ev.memo) { memoR.style.display = ''; document.getElementById('pp-memo').textContent = ev.memo; }
  else memoR.style.display = 'none';
  const popup = document.getElementById('popup');
  popup.classList.add('on');
  const vw = window.innerWidth, vh = window.innerHeight, pw = 296, ph = 260;
  let x = e.clientX + 10, y = e.clientY + 10;
  if (x + pw > vw) x = Math.max(8, e.clientX - pw - 8);
  if (y + ph > vh) y = Math.max(8, vh - ph - 8);
  if (x < 8) x = 8;
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
}
function closePopup() { document.getElementById('popup').classList.remove('on'); popupId = null; }
function editFromPopup() { if (popupId) editEvent(popupId); }
function delFromPopup() {
  if (!popupId) return;
  if (!confirm('삭제하시겠습니까?')) return;
  db.ref(`${ROOT}/events/${popupId}`).remove();
  closePopup();
  toast('일정이 삭제되었습니다.');
}

function editEvent(id) {
  const ev = events.find(x => x.id === id);
  if (!ev) return;
  editId = id;
  document.getElementById('ev-modal-title').textContent = '일정 수정';
  document.getElementById('ev-del-btn').style.display = '';
  document.getElementById('ev-title').value = ev.title || '';
  document.getElementById('ev-cat').value = ev.cat || 'education';
  document.getElementById('ev-member').value = ev.memberId || '';
  document.getElementById('ev-sd').value = ev.startDate || '';
  document.getElementById('ev-ed').value = ev.endDate || ev.startDate || '';
  document.getElementById('ev-allday').checked = !!ev.allday;
  document.getElementById('ev-st').value = ev.startTime || '09:00';
  document.getElementById('ev-et').value = ev.endTime || '10:00';
  document.getElementById('ev-repeat').value = ev.repeat || 'none';
  document.getElementById('ev-memo').value = ev.memo || '';
  document.getElementById('time-area').style.display = ev.allday ? 'none' : '';
  closePopup();
  document.getElementById('ev-modal').classList.add('on');
}
function toggleAllday() {
  document.getElementById('time-area').style.display = document.getElementById('ev-allday').checked ? 'none' : '';
}
function saveEvent() {
  const title = document.getElementById('ev-title').value.trim();
  if (!title) { toast('제목을 입력하세요.', 'err'); return; }
  const sd = document.getElementById('ev-sd').value;
  const ed = document.getElementById('ev-ed').value || sd;
  const ev = {
    title,
    cat: document.getElementById('ev-cat').value,
    memberId: document.getElementById('ev-member').value || '',
    startDate: sd,
    endDate: ed,
    allday: document.getElementById('ev-allday').checked,
    startTime: document.getElementById('ev-st').value,
    endTime: document.getElementById('ev-et').value,
    repeat: document.getElementById('ev-repeat').value,
    memo: document.getElementById('ev-memo').value.trim(),
    updatedAt: Date.now()
  };
  if (editId) {
    db.ref(`${ROOT}/events/${editId}`).update(ev)
      .then(() => { closeEvModal(); toast('일정이 수정되었습니다.'); })
      .catch(e => toast('저장 실패: ' + e.message, 'err'));
  } else {
    db.ref(`${ROOT}/events`).push(ev)
      .then(() => { closeEvModal(); toast('일정이 추가되었습니다.'); })
      .catch(e => toast('저장 실패: ' + e.message, 'err'));
  }
}
function closeEvModal() { document.getElementById('ev-modal').classList.remove('on'); }
function delCurEvent() {
  if (!editId) return;
  if (!confirm('삭제하시겠습니까?')) return;
  db.ref(`${ROOT}/events/${editId}`).remove();
  closeEvModal();
  toast('일정이 삭제되었습니다.');
}

function closeMemberModal() {

}
function checkPw() {

  if (val !== ADMIN_PW) {
    document.getElementById('pw-error').style.display = 'block';
    document.getElementById('pw-input').value = '';

  renderMemberList();

function renderSwatches() {
  document.getElementById('swatches').innerHTML = COLORS.map((c, i) =>
    `<div class="sw${i===swIdx?' on':''}" style="background:${c}" onclick="pickSwatch(${i})"></div>`
  ).join('');
}
function pickSwatch(i) { swIdx = i; renderSwatches(); }

function renderMemberList() {
  const el = document.getElementById('mem-list');
  if (!el) return;
  if (members.length === 0) {
    el.innerHTML = '<div class="empty-msg">등록된 팀원이 없습니다.</div>';
    return;
  }
  el.innerHTML = members.map(m => `
    <div class="mem-row">
      <div class="dot" style="background:${m.color}"></div>
      <div class="name">${esc(m.name)}</div>
      <button onclick="removeMember('${m.id}','${esc(m.name)}')">삭제</button>
    </div>
  `).join('');
}

function addMember() {
  const nameEl = document.getElementById('mem-name');
  const name = nameEl.value.trim();
  if (!name) { toast('이름을 입력하세요.', 'err'); return; }
  if (!db) { toast('Firebase 연결 안됨', 'err'); return; }

  const newMember = { name, color: COLORS[swIdx], hidden: false };
  // Firebase에 저장 — onValue가 자동으로 목록 갱신
  db.ref(`${ROOT}/members`).push(newMember)
    .then(() => {
      nameEl.value = '';
      nameEl.focus();
      toast('"' + name + '" 팀원이 추가되었습니다.');
    })
    .catch(e => {
      console.error('addMember 실패:', e);
      toast('저장 실패: ' + e.message, 'err');
    });
}

function removeMember(id, name) {
  if (!confirm(`'${name}' 팀원을 삭제하시겠습니까?`)) return;
  db.ref(`${ROOT}/members/${id}`).remove()
    .then(() => {
      // 해당 팀원의 일정에서 memberId 비우기
      events.filter(e => e.memberId === id).forEach(e => {
        db.ref(`${ROOT}/events/${e.id}/memberId`).set('');
      });
      toast('팀원이 삭제되었습니다.');
    })
    .catch(e => toast('삭제 실패: ' + e.message, 'err'));
}

   ICS Export
───────────────────────────────── */
function pad2(n) { return String(n).padStart(2, '0'); }
function toICSDate(ds, ts) {
  if (!ds) return '';
  const p = ds.split('-');
  if (ts) { const t = ts.split(':'); return p[0]+p[1]+p[2]+'T'+t[0]+t[1]+'00'; }
  return p[0]+p[1]+p[2];
}
function exportICS() {
  if (!events.length) { toast('내보낼 일정이 없습니다.', 'err'); return; }
  const now = new Date();
  const stamp = toICSDate(dStr(now), pad2(now.getHours())+':'+pad2(now.getMinutes()));
  const lines = ['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//TeamScheduler//KR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.forEach(ev => {
    const cat = CATS[ev.cat];
    lines.push('BEGIN:VEVENT', 'UID:'+ev.id+'@teamscheduler', 'DTSTAMP:'+stamp);
    if (ev.allday) {
      lines.push('DTSTART;VALUE=DATE:'+toICSDate(ev.startDate));
      lines.push('DTEND;VALUE=DATE:'+toICSDate(ev.endDate||ev.startDate));
    } else {
      lines.push('DTSTART:'+toICSDate(ev.startDate, ev.startTime));
      lines.push('DTEND:'+toICSDate(ev.endDate||ev.startDate, ev.endTime));
    }
    lines.push('SUMMARY:'+(ev.title||''));
    if (cat) lines.push('CATEGORIES:'+cat.l);
    if (ev.memo) lines.push('DESCRIPTION:'+(ev.memo||'').replace(/\n/g, '\\n'));
    const repMap = {daily:'DAILY',weekly:'WEEKLY',monthly:'MONTHLY',yearly:'YEARLY'};
    if (ev.repeat && repMap[ev.repeat]) lines.push('RRULE:FREQ='+repMap[ev.repeat]);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob = new Blob([lines.join('\r\n')], {type:'text/calendar;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '팀스케줄_'+dStr(new Date())+'.ics';
  a.click();
}

/* ─────────────────────────────────
   Theme
───────────────────────────────── */
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ts_theme', t);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = t === 'dark' ? '☀️' : '🌙';
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme') || 'light';
  applyTheme(cur === 'light' ? 'dark' : 'light');
}

/* ─────────────────────────────────
   Touch / Keyboard
───────────────────────────────── */
let tsX = 0, tsY = 0, tMoved = false;
document.addEventListener('DOMContentLoaded', () => {
  const calEl = document.getElementById('cal');
  if (!calEl) return;
  calEl.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    tsX = e.touches[0].clientX; tsY = e.touches[0].clientY; tMoved = false;
  }, {passive: true});
  calEl.addEventListener('touchmove', e => {
    if (e.touches.length !== 1) return;
    if (Math.abs(e.touches[0].clientX - tsX) > 8 || Math.abs(e.touches[0].clientY - tsY) > 8) tMoved = true;
  }, {passive: true});
  calEl.addEventListener('touchend', e => {
    if (e.changedTouches.length !== 1) return;
    const dx = e.changedTouches[0].clientX - tsX;
    const dy = Math.abs(e.changedTouches[0].clientY - tsY);
    if (Math.abs(dx) > 55 && dy < 45) { nav(dx < 0 ? 1 : -1); return; }
    if (!tMoved && curView === 'week') {
      let lane = e.target;
      while (lane && !lane.dataset.date) lane = lane.parentElement;
      if (lane && lane.dataset.date) openNewEventOnDate(lane.dataset.date);
    }
  }, {passive: true});
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closePopup(); closeEvModal(); closeMemberModal(); closeSearch();
  }
});
document.addEventListener('click', e => {
  const popup = document.getElementById('popup');
  if (popup && popup.classList.contains('on') && !popup.contains(e.target)) closePopup();
});

setInterval(() => { if (curView === 'week') renderWeek(); }, 60000);

  // Firebase 초기화

    firebase.initializeApp(FB_CFG);

  setView('month');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').style.display = 'flex';
  subscribeAll();
});
