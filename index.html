<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#0A0A0F">
<title>팀 스케줄러 — 공주시정신건강복지센터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- ══ Firebase SDK (v10 modular) ══ -->
<script type="importmap">
{
  "imports": {
    "firebase/app":      "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js",
    "firebase/database": "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"
  }
}
</script>

<style>
/* ══════════════════════════════════════════
   Design Tokens
══════════════════════════════════════════ */
:root {
  --bg:           #0A0A0F;
  --bg2:          #111118;
  --bg3:          #18181F;
  --bg4:          #1E1E28;
  --surface:      #22222E;
  --surface2:     #2A2A38;
  --border:       rgba(255,255,255,0.07);
  --border2:      rgba(255,255,255,0.12);

  --accent:       #4F8EF7;
  --accent-dim:   rgba(79,142,247,0.15);
  --accent-glow:  rgba(79,142,247,0.35);

  --text:         #F0F0F8;
  --text-muted:   #8888A0;
  --text-faint:   #44445A;

  --danger:       #FF5555;
  --danger-dim:   rgba(255,85,85,0.15);
  --success:      #4ADE80;
  --warning:      #FFB347;

  --r-sm:  6px;
  --r-md:  10px;
  --r-lg:  16px;
  --r-xl:  22px;
  --r-pill:9999px;

  --sb-w:  230px;
  --nav-h: 54px;
  --font:  'Noto Sans KR', system-ui, sans-serif;
  --sab:   env(safe-area-inset-bottom, 0px);
  --sat:   env(safe-area-inset-top, 0px);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
  --shadow-md: 0 4px 24px rgba(0,0,0,0.6);
  --shadow-lg: 0 8px 48px rgba(0,0,0,0.8);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; -webkit-font-smoothing: antialiased; }
button, input, select, textarea { font-family: var(--font); cursor: pointer; }
input, select, textarea { cursor: text; }

/* ══════════════════════════════════════════
   App Layout
══════════════════════════════════════════ */
#app { display: flex; height: 100dvh; overflow: hidden; }

/* ══════════════════════════════════════════
   Sidebar
══════════════════════════════════════════ */
#sidebar {
  width: var(--sb-w);
  flex-shrink: 0;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  z-index: 150;
}

#sb-brand {
  padding: 20px 18px 14px;
  padding-top: calc(var(--sat) + 20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#sb-brand .org {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.6px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
#sb-brand .app-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.3px;
}
.firebase-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--success);
  background: rgba(74,222,128,0.1);
  border: 1px solid rgba(74,222,128,0.2);
  border-radius: var(--r-pill);
  padding: 2px 7px;
  margin-top: 6px;
}
.firebase-badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

#sb-body { flex: 1; overflow-y: auto; padding: 10px 10px; -webkit-overflow-scrolling: touch; }
#sb-foot { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }

.sb-section { font-size: 10px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.8px; text-transform: uppercase; margin: 14px 8px 5px; }
.sb-section:first-child { margin-top: 6px; }

/* Member items */
.mb-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: var(--r-md);
  cursor: pointer; margin-bottom: 1px;
  transition: background .15s;
  user-select: none;
}
.mb-item:hover { background: rgba(255,255,255,0.04); }
.mb-item:active { background: rgba(255,255,255,0.07); }
.mb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.mb-name { font-size: 13px; font-weight: 400; color: var(--text); flex: 1; }
.mb-cnt { font-size: 11px; color: var(--text-faint); background: var(--surface); border-radius: var(--r-pill); padding: 1px 6px; }
.mb-item.dim .mb-name { color: var(--text-faint); }
.mb-item.dim .mb-dot { opacity: 0.3; }

/* Category items */
.cat-item {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px; border-radius: var(--r-md);
  cursor: pointer; margin-bottom: 1px;
  transition: background .15s;
  user-select: none;
}
.cat-item:hover { background: rgba(255,255,255,0.04); }
.cat-item:active { background: rgba(255,255,255,0.07); }
.cat-dot { width: 6px; height: 6px; border-radius: 2px; flex-shrink: 0; }
.cat-name { font-size: 12px; font-weight: 400; color: var(--text-muted); flex: 1; }
.cat-item.dim .cat-name { color: var(--text-faint); }
.cat-item.dim .cat-dot { opacity: 0.25; }

/* Sidebar buttons */
.sb-btn {
  width: 100%; padding: 8px 10px;
  border-radius: var(--r-md); border: 1px solid var(--border2);
  background: transparent; font-size: 12px; font-weight: 400;
  color: var(--text-muted); text-align: left;
  margin-bottom: 5px; transition: all .15s;
}
.sb-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.sb-btn:active { background: rgba(255,255,255,0.08); }

/* ══════════════════════════════════════════
   Main
══════════════════════════════════════════ */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100dvh; overflow: hidden; background: var(--bg); }

/* ══════════════════════════════════════════
   Toolbar
══════════════════════════════════════════ */
#toolbar {
  height: var(--nav-h);
  min-height: var(--nav-h);
  flex-shrink: 0;
  background: rgba(10,10,15,0.85);
  backdrop-filter: saturate(150%) blur(24px);
  -webkit-backdrop-filter: saturate(150%) blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  padding: 0 16px;
}

#menu-btn {
  display: none; background: none; border: none;
  width: 32px; height: 32px; border-radius: var(--r-md);
  font-size: 18px; color: var(--text-muted);
  align-items: center; justify-content: center;
}
#menu-btn:hover { background: var(--surface); color: var(--text); }

#nav-center { display: flex; align-items: center; gap: 3px; flex: 1; justify-content: center; }

.nav-arrow {
  background: none; border: none;
  width: 30px; height: 30px; border-radius: 50%;
  font-size: 18px; color: var(--accent);
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.nav-arrow:hover { background: var(--accent-dim); }
.nav-arrow:active { transform: scale(0.88); }

#ym-wrap { display: flex; align-items: center; gap: 0; }
.ym-select {
  border: none; background: transparent;
  font-family: var(--font); font-size: 15px; font-weight: 700;
  color: var(--text); cursor: pointer; appearance: none; -webkit-appearance: none;
  padding: 5px 6px; border-radius: var(--r-md);
  transition: background .15s;
}
.ym-select:focus { outline: none; background: var(--surface); }
.ym-select:hover { background: var(--surface); }
.ym-select option { background: var(--bg3); }

#week-label {
  font-size: 14px; font-weight: 700; color: var(--text);
  padding: 0 6px; white-space: nowrap;
}

#toolbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

#today-btn {
  background: transparent; border: none;
  color: var(--accent); font-size: 13px; font-weight: 500;
  padding: 5px 10px; border-radius: var(--r-pill);
  transition: background .15s;
}
#today-btn:hover { background: var(--accent-dim); }

.vt {
  display: flex; background: var(--surface); border-radius: var(--r-pill);
  padding: 2px; gap: 1px;
}
.vt-btn {
  padding: 4px 11px; border-radius: var(--r-pill); border: none;
  background: transparent; font-size: 12px; font-weight: 600;
  color: var(--text-muted); transition: all .15s;
}
.vt-btn.on { background: var(--surface2); color: var(--text); box-shadow: var(--shadow-sm); }

#add-btn {
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--r-pill); padding: 7px 14px;
  font-size: 13px; font-weight: 600; letter-spacing: -0.1px;
  transition: all .15s; box-shadow: 0 0 12px var(--accent-glow);
}
#add-btn:hover { filter: brightness(1.1); box-shadow: 0 0 20px var(--accent-glow); }
#add-btn:active { transform: scale(0.94); }

#search-btn {
  display: none; background: none; border: none;
  width: 30px; height: 30px; border-radius: var(--r-md);
  font-size: 16px; color: var(--accent);
  align-items: center; justify-content: center;
}

/* ══════════════════════════════════════════
   Calendar Area
══════════════════════════════════════════ */
#cal { flex: 1; overflow: hidden; display: flex; flex-direction: column; min-height: 0; }

/* ── Month View ── */
#mv { flex: 1; display: flex; flex-direction: column; min-height: 0; }

.dow-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  flex-shrink: 0; background: var(--bg2);
  border-bottom: 1px solid var(--border);
}
.dow-cell {
  text-align: center; padding: 8px 2px;
  font-size: 11px; font-weight: 600; color: var(--text-faint);
  letter-spacing: 0.4px; text-transform: uppercase;
}
.dow-cell:first-child { color: var(--danger); }
.dow-cell:last-child { color: var(--accent); }

.month-grid {
  flex: 1; display: grid;
  grid-template-columns: repeat(7, 1fr);
  grid-auto-rows: minmax(68px, 1fr);
  overflow: hidden; min-height: 0;
}

.dc {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 6px 5px 4px; display: flex; flex-direction: column;
  overflow: hidden; background: var(--bg); cursor: pointer;
  touch-action: manipulation; min-height: 0;
  transition: background .12s;
}
.dc:hover { background: var(--bg3); }
.dc:active { background: var(--bg4); }
.dc:nth-child(7n) { border-right: none; }
.dc.other { background: var(--bg2); }
.dc.other .dn { color: var(--text-faint); }
.dc.sun .dn { color: var(--danger); }
.dc.sat .dn { color: var(--accent); }

.dn {
  font-size: 12px; font-weight: 400; line-height: 1;
  margin-bottom: 4px; flex-shrink: 0; color: var(--text-muted);
}
.dn-today {
  display: inline-flex; align-items: center; justify-content: center;
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 700;
  box-shadow: 0 0 10px var(--accent-glow);
}

.ev-chip {
  font-size: 10px; font-weight: 600;
  border-radius: 4px; padding: 2px 5px;
  margin-bottom: 2px; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; flex-shrink: 0;
  touch-action: manipulation;
  transition: filter .12s;
}
.ev-chip:hover { filter: brightness(1.2); }
.more-lbl {
  font-size: 10px; color: var(--accent); flex-shrink: 0;
  padding: 0 3px; font-weight: 600;
}

/* ── Week View ── */
#wv { flex: 1; display: flex; flex-direction: column; min-height: 0; }

.wk-head {
  display: flex; background: var(--bg2);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.wk-gut { width: 44px; flex-shrink: 0; }
.wk-dc { flex: 1; border-left: 1px solid var(--border); text-align: center; padding: 7px 2px; }
.wk-dc .wdn { font-size: 10px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.5px; text-transform: uppercase; }
.wk-dc .wdd { font-size: 16px; font-weight: 700; margin-top: 2px; color: var(--text-muted); }
.wk-dc.today .wdd {
  display: inline-flex; align-items: center; justify-content: center;
  width: 30px; height: 30px; border-radius: 50%;
  background: var(--accent); color: #fff;
  box-shadow: 0 0 10px var(--accent-glow);
}
.wk-dc.sun .wdd { color: var(--danger); }
.wk-dc.sat .wdd { color: var(--accent); }

.ad-row {
  display: flex; background: var(--bg3);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; min-height: 24px;
}
.ad-gut {
  width: 44px; font-size: 9px; color: var(--text-faint);
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 6px; flex-shrink: 0;
}
.ad-cols { flex: 1; display: flex; }
.ad-col { flex: 1; padding: 2px 3px; border-left: 1px solid var(--border); display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
.ad-chip {
  font-size: 10px; font-weight: 600; border-radius: 4px;
  padding: 2px 5px; white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; cursor: pointer;
}

.wk-body { flex: 1; overflow-y: auto; display: flex; min-height: 0; -webkit-overflow-scrolling: touch; }
.wk-tcol { width: 44px; flex-shrink: 0; position: relative; }
.t-lbl {
  position: absolute; right: 6px; font-size: 9px;
  color: var(--text-faint); transform: translateY(-50%);
  line-height: 1; white-space: nowrap;
}
.wk-days { flex: 1; display: flex; position: relative; }
.wk-lane { flex: 1; border-left: 1px solid var(--border); position: relative; }
.wk-lane.today-bg { background: rgba(79,142,247,0.03); }
.h-line { position: absolute; left: 0; right: 0; border-top: 1px solid var(--border); pointer-events: none; }
.h-half { position: absolute; left: 0; right: 0; border-top: 1px dashed rgba(255,255,255,0.03); pointer-events: none; }
.now-line { position: absolute; left: 0; right: 0; border-top: 2px solid var(--accent); pointer-events: none; z-index: 5; }
.now-dot { position: absolute; left: -4px; top: -4px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 6px var(--accent-glow); }

.wk-ev {
  position: absolute; border-radius: 6px;
  padding: 3px 6px; font-size: 11px; font-weight: 600;
  overflow: hidden; cursor: pointer; left: 2px; right: 2px; z-index: 3;
  border-left: 3px solid rgba(0,0,0,0.2);
  touch-action: manipulation; transition: filter .1s, transform .1s;
}
.wk-ev:hover { filter: brightness(1.15); transform: translateX(1px); }
.wk-ev:active { transform: scale(0.97); }
.wk-ev-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.wk-ev-time { font-size: 9px; opacity: .7; font-weight: 400; }

/* ══════════════════════════════════════════
   Event Popup
══════════════════════════════════════════ */
#popup {
  position: fixed; background: var(--bg3);
  border-radius: var(--r-xl); box-shadow: var(--shadow-lg);
  width: 290px; z-index: 300; display: none;
  border: 1px solid var(--border2); overflow: hidden;
}
#popup.on { display: block; animation: popIn .15s ease; }
@keyframes popIn { from{opacity:0;transform:scale(0.92)} to{opacity:1;transform:scale(1)} }
.pp-bar { height: 3px; }
.pp-body { padding: 14px 16px; }
.pp-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.pp-row { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--text-muted); margin-top: 5px; }
.pp-icon { font-size: 12px; flex-shrink: 0; line-height: 1.5; }
.pp-acts {
  display: flex; gap: 6px; padding: 10px 14px;
  border-top: 1px solid var(--border); background: var(--bg2);
}
.pp-btn {
  flex: 1; padding: 7px; border-radius: var(--r-md);
  font-size: 12px; font-weight: 600; border: 1px solid var(--border2);
  background: var(--surface); color: var(--text-muted);
  transition: all .12s;
}
.pp-btn:hover { background: var(--surface2); color: var(--text); }
.pp-edit { color: var(--accent); border-color: rgba(79,142,247,0.25); background: var(--accent-dim); }
.pp-del { color: var(--danger); border-color: rgba(255,85,85,0.2); background: var(--danger-dim); }

/* ══════════════════════════════════════════
   Modal / Sheet
══════════════════════════════════════════ */
.ov {
  position: fixed; inset: 0; background: rgba(0,0,0,0.65);
  display: none; align-items: flex-end; justify-content: center;
  z-index: 200; backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.ov.on { display: flex; }
@media(min-width:641px) { .ov { align-items: center; padding: 20px; } }

.modal {
  background: var(--bg3); border-radius: 22px 22px 0 0;
  width: 100%; max-width: 460px; display: flex; flex-direction: column;
  max-height: 92dvh; overflow: hidden;
  border: 1px solid var(--border2); border-bottom: none;
  animation: slideUp .25s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
@media(min-width:641px) { .modal { border-radius: var(--r-xl); border: 1px solid var(--border2); max-height: 88vh; animation: popIn .2s ease; } }

.mh {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.mh h3 { font-size: 16px; font-weight: 700; color: var(--text); }
.mc-btn {
  background: var(--surface); border: none; border-radius: 50%;
  width: 28px; height: 28px; font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.mc-btn:hover { background: var(--surface2); color: var(--text); }

.mb { padding: 14px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
.mf {
  padding: 12px 20px; border-top: 1px solid var(--border);
  display: flex; gap: 8px; flex-shrink: 0; background: var(--bg2);
}

/* Form */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.3px; text-transform: uppercase; }
.field input, .field select, .field textarea {
  padding: 10px 13px; border: 1px solid var(--border2);
  border-radius: var(--r-md); font-size: 14px; font-weight: 400;
  color: var(--text); background: var(--surface);
  transition: border-color .15s, box-shadow .15s; appearance: none; -webkit-appearance: none;
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: none; border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.field select option { background: var(--bg3); }
.field textarea { resize: vertical; min-height: 64px; cursor: text; }

.fg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.chk-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 0; font-size: 14px; color: var(--text); cursor: pointer;
}
.chk-row input { width: 16px; height: 16px; accent-color: var(--accent); }

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  padding: 10px 18px; border-radius: var(--r-pill);
  font-size: 14px; font-weight: 600; border: 1px solid transparent;
  touch-action: manipulation; transition: all .12s;
}
.btn:active { transform: scale(0.95); }
.btn-p { background: var(--accent); color: #fff; box-shadow: 0 0 12px var(--accent-glow); }
.btn-p:hover { filter: brightness(1.1); box-shadow: 0 0 20px var(--accent-glow); }
.btn-o { background: var(--surface); color: var(--text-muted); border-color: var(--border2); }
.btn-o:hover { background: var(--surface2); color: var(--text); }
.btn-d { background: var(--danger-dim); color: var(--danger); border-color: rgba(255,85,85,0.25); }
.btn-f { width: 100%; border-radius: var(--r-pill); }

/* ══════════════════════════════════════════
   Search Overlay
══════════════════════════════════════════ */
#search-ov {
  position: fixed; top: 0; left: 0; right: 0; z-index: 400; display: none;
  background: rgba(10,10,15,0.92);
  backdrop-filter: saturate(150%) blur(24px);
  -webkit-backdrop-filter: saturate(150%) blur(24px);
  border-bottom: 1px solid var(--border);
  padding: 10px 12px; padding-top: calc(var(--sat) + 10px);
  align-items: center; gap: 8px;
}
#search-ov.on { display: flex; }
#search-ov input {
  flex: 1; padding: 9px 14px; border: 1px solid var(--border2);
  border-radius: var(--r-pill); font-size: 14px; outline: none;
  background: var(--surface); color: var(--text);
}
#search-ov input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
#search-ov input::placeholder { color: var(--text-faint); }
#search-cancel { background: none; border: none; font-size: 14px; font-weight: 500; color: var(--accent); padding: 6px 8px; white-space: nowrap; }

/* ══════════════════════════════════════════
   Toast
══════════════════════════════════════════ */
#toast {
  position: fixed; bottom: calc(var(--sab) + 16px); right: 16px;
  border-radius: var(--r-pill); padding: 7px 14px;
  font-size: 12px; font-weight: 500; opacity: 0;
  transition: opacity .3s, transform .3s; z-index: 500;
  pointer-events: none; transform: translateY(8px);
}
#toast.on { opacity: 1; transform: translateY(0); }
#toast.ok { background: rgba(74,222,128,0.15); color: var(--success); border: 1px solid rgba(74,222,128,0.25); }
#toast.err { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,85,85,0.25); }

/* ══════════════════════════════════════════
   Loading Overlay
══════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px; z-index: 9999;
}
#loading .spin {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--surface2);
  border-top-color: var(--accent);
  animation: spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
#loading p { font-size: 14px; color: var(--text-muted); }
#loading.hidden { display: none; }

/* ══════════════════════════════════════════
   Firebase Config Screen
══════════════════════════════════════════ */
#config-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9998; padding: 24px;
}
#config-screen.hidden { display: none; }
.config-card {
  background: var(--bg3); border: 1px solid var(--border2);
  border-radius: var(--r-xl); padding: 28px; width: 100%; max-width: 440px;
  box-shadow: var(--shadow-lg);
}
.config-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.config-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.6; }
.config-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.config-field label { font-size: 11px; font-weight: 600; color: var(--text-faint); letter-spacing: 0.3px; text-transform: uppercase; }
.config-field input {
  padding: 9px 12px; border: 1px solid var(--border2);
  border-radius: var(--r-md); font-size: 13px;
  color: var(--text); background: var(--surface);
  transition: border-color .15s;
}
.config-field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.config-field input::placeholder { color: var(--text-faint); }
.config-hint { font-size: 11px; color: var(--text-faint); margin-top: 4px; }
.connect-btn {
  width: 100%; margin-top: 16px; padding: 12px;
  background: var(--accent); color: #fff; border: none;
  border-radius: var(--r-pill); font-size: 15px; font-weight: 700;
  box-shadow: 0 0 16px var(--accent-glow);
  transition: all .15s;
}
.connect-btn:hover { filter: brightness(1.1); }
.config-reset { font-size: 11px; color: var(--text-faint); text-align: center; margin-top: 12px; cursor: pointer; text-decoration: underline; }

/* ══════════════════════════════════════════
   Swatches
══════════════════════════════════════════ */
.swatches { display: flex; gap: 8px; flex-wrap: wrap; padding: 4px 0; }
.sw {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2.5px solid transparent; transition: all .15s;
}
.sw.on { border-color: #fff; box-shadow: 0 0 0 2px var(--surface2); }

/* ══════════════════════════════════════════
   Mobile
══════════════════════════════════════════ */
@media(max-width:640px) {
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-102%); }
  #sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  #sb-ov { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 140; }
  #sb-ov.on { display: block; }
  #menu-btn { display: flex !important; }
  #desktop-vt { display: none !important; }
  #mobile-vt { display: flex !important; }
  #search-btn { display: flex !important; }
  #today-btn { display: none; }
  .wk-gut, .wk-tcol { width: 36px; }
  .ad-gut { width: 36px; }
  .fg2 { grid-template-columns: 1fr; }
}
#desktop-vt { display: flex; }
#mobile-vt { display: none; }

/* Print */
@media print {
  #sidebar, #toolbar, #popup, #toast, #search-ov, #loading, #config-screen { display: none !important; }
  #main, #cal, #mv, .month-grid { overflow: visible !important; height: auto !important; }
  body { background: #fff; color: #000; }
  #app { display: block; }
}

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: var(--r-pill); }
</style>
</head>

<!-- ══ Firebase Logic ══ -->
<script type="module">
import { initializeApp, getApps } from 'firebase/app';
import {
  getDatabase, ref, push, set, update, remove, onValue, off
} from 'firebase/database';

/* ─────────────────────────────────
   Constants
───────────────────────────────── */
const ROOT = 'team-scheduler-v1';
const COLORS = ['#4F8EF7','#4ADE80','#FFB347','#FF5555','#BF79F9','#FF79C0','#56C8F0','#FED766','#A8EDEA','#9B8EF7'];
const CATS = {
  meeting:   {l:'회의/미팅', i:'📋', c:'#4F8EF7', bg:'rgba(79,142,247,0.15)'},
  education: {l:'교육',      i:'📚', c:'#56C8F0', bg:'rgba(86,200,240,0.15)'},
  visit:     {l:'방문/외근', i:'🚶', c:'#4ADE80', bg:'rgba(74,222,128,0.15)'},
  admin:     {l:'행정',      i:'📂', c:'#FFB347', bg:'rgba(255,179,71,0.15)'},
  personal:  {l:'개인',      i:'🧍', c:'#FF5555', bg:'rgba(255,85,85,0.15)'},
  other:     {l:'기타',      i:'📌', c:'#BF79F9', bg:'rgba(191,121,249,0.15)'}
};
const REP = {none:'없음',daily:'매일',weekly:'매주',monthly:'매월',yearly:'매년'};
const HOUR_H = 54;
const MIN_YEAR = 2020, MAX_YEAR = 2032;
const CFG_KEY = 'team_sched_fb_config';

/* ─────────────────────────────────
   State
───────────────────────────────── */
let db = null;
let members = [];
let events = [];
let hiddenCats = JSON.parse(localStorage.getItem('team_sched_hidden_cats') || '[]');
let curDate = new Date();
let curView = 'month';
let editId = null;
let popupId = null;
let swIdx = 0;
let searchQ = '';
let unsubMembers = null;
let unsubEvents  = null;

/* ─────────────────────────────────
   Firebase Config
───────────────────────────────── */
window.connectFirebase = async function() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  const pid = document.getElementById('cfg-pid').value.trim();
  if (!url || !key || !pid) { toast('모든 항목을 입력해주세요.', 'err'); return; }
  const cfg = { databaseURL: url, apiKey: key, projectId: pid,
    authDomain: pid + '.firebaseapp.com',
    storageBucket: pid + '.appspot.com' };
  localStorage.setItem(CFG_KEY, JSON.stringify(cfg));
  await initFB(cfg);
};

window.showConfigScreen = function() {
  document.getElementById('config-screen').classList.remove('hidden');
  document.getElementById('app').style.display = 'none';
};

window.resetConfig = function() {
  if (!confirm('Firebase 설정을 초기화하시겠습니까?')) return;
  localStorage.removeItem(CFG_KEY);
  location.reload();
};

async function initFB(cfg) {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('config-screen').classList.add('hidden');
  try {
    const existingApps = getApps();
    const app = existingApps.length ? existingApps[0] : initializeApp(cfg);
    db = getDatabase(app);
    subscribeAll();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('app').style.display = 'flex';
    buildYearOptions();
    setView('month');
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    toast('Firebase 연결 실패: ' + e.message, 'err');
    showConfigScreen();
  }
}

/* Auto-connect if config saved */
(function() {
  const raw = localStorage.getItem(CFG_KEY);
  if (raw) {
    try { initFB(JSON.parse(raw)); return; }
    catch(e) {}
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('config-screen').classList.remove('hidden');
})();

/* ─────────────────────────────────
   Firebase Subscriptions
───────────────────────────────── */
function subscribeAll() {
  // members
  const mbRef = ref(db, `${ROOT}/members`);
  onValue(mbRef, snap => {
    members = [];
    snap.forEach(child => members.push({ id: child.key, ...child.val() }));
    renderSidebar();
    render();
  }, e => toast('팀원 동기화 오류', 'err'));

  // events
  const evRef = ref(db, `${ROOT}/events`);
  onValue(evRef, snap => {
    events = [];
    snap.forEach(child => events.push({ id: child.key, ...child.val() }));
    render();
    toast('동기화됨', 'ok');
  }, e => toast('일정 동기화 오류', 'err'));
}

/* ─────────────────────────────────
   Toast
───────────────────────────────── */
let toastTimer;
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'on ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('on'); }, 2000);
}
window.toast = toast;

/* ─────────────────────────────────
   Sidebar
───────────────────────────────── */
window.toggleSidebar = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sb-ov').classList.toggle('on');
};
window.closeSidebar = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-ov').classList.remove('on');
};

function renderSidebar() {
  // members
  let ml = '';
  members.forEach(m => {
    const cnt = events.filter(e => e.memberId === m.id).length;
    ml += `<div class="mb-item${m.hidden?' dim':''}" onclick="toggleMember('${m.id}')">
      <div class="mb-dot" style="background:${m.color}"></div>
      <div class="mb-name">${esc(m.name)}</div>
      <div class="mb-cnt">${cnt}</div>
    </div>`;
  });
  document.getElementById('mb-list').innerHTML = ml;

  // cats
  let cl = '';
  Object.entries(CATS).forEach(([key, info]) => {
    const dim = hiddenCats.includes(key);
    cl += `<div class="cat-item${dim?' dim':''}" onclick="toggleCat('${key}')">
      <div class="cat-dot" style="background:${info.c}"></div>
      <div class="cat-name">${info.i} ${info.l}</div>
    </div>`;
  });
  document.getElementById('cat-list').innerHTML = cl;

  // member select in modal
  const ms = document.getElementById('ev-member');
  let msHtml = '<option value="">미지정</option>';
  members.forEach(m => { msHtml += `<option value="${m.id}">${esc(m.name)}</option>`; });
  ms.innerHTML = msHtml;

  // member manage list
  renderMemManage();
}

window.toggleMember = id => {
  const m = members.find(x => x.id === id);
  if (!m) return;
  update(ref(db, `${ROOT}/members/${id}`), { hidden: !m.hidden });
};
window.toggleCat = key => {
  const idx = hiddenCats.indexOf(key);
  if (idx >= 0) hiddenCats.splice(idx, 1); else hiddenCats.push(key);
  localStorage.setItem('team_sched_hidden_cats', JSON.stringify(hiddenCats));
  renderSidebar(); render();
};

/* ─────────────────────────────────
   Visibility
───────────────────────────────── */
function isVisible(ev) {
  if (hiddenCats.includes(ev.cat)) return false;
  const m = getMember(ev.memberId);
  if (m && m.hidden) return false;
  if (searchQ) {
    const q = searchQ.toLowerCase();
    const inT = (ev.title||'').toLowerCase().includes(q);
    const inMemo = (ev.memo||'').toLowerCase().includes(q);
    const inM = m ? m.name.toLowerCase().includes(q) : false;
    const cat = CATS[ev.cat];
    const inC = cat ? cat.l.toLowerCase().includes(q) : false;
    if (!inT && !inMemo && !inM && !inC) return false;
  }
  return true;
}

/* ─────────────────────────────────
   Date Utils
───────────────────────────────── */
function dStr(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function pDate(s) { if (!s) return null; const p = s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function sameDay(a,b) { return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function weekStart(d) { const w=new Date(d); w.setDate(d.getDate()-d.getDay()); return w; }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function getMember(id) { return members.find(m => m.id === id) || null; }
function getEvColor(ev) { const m=getMember(ev.memberId); return m ? m.color : (CATS[ev.cat]?.c || '#4F8EF7'); }
function getEvBg(ev)    { const m=getMember(ev.memberId); return m ? m.color+'22' : (CATS[ev.cat]?.bg || 'rgba(79,142,247,0.15)'); }

function occursOn(ev, d) {
  const ds = dStr(d), start = ev.startDate||'', end = ev.endDate||start, rep = ev.repeat||'none';
  if (rep === 'none') return ds >= start && ds <= end;
  if (ds < start) return false;
  if (rep === 'daily') return true;
  if (rep === 'weekly') { const sd=pDate(start); return d.getDay()===sd.getDay(); }
  if (rep === 'monthly') { const sd=pDate(start); return d.getDate()===sd.getDate(); }
  if (rep === 'yearly') { const sd=pDate(start); return d.getMonth()===sd.getMonth()&&d.getDate()===sd.getDate(); }
  return false;
}

/* ─────────────────────────────────
   Navigation
───────────────────────────────── */
function buildYearOptions() {
  const sel = document.getElementById('sel-year');
  sel.innerHTML = '';
  for (let y=MIN_YEAR; y<=MAX_YEAR; y++) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y + '년'; sel.appendChild(o);
  }
  sel.value = curDate.getFullYear();
}

function syncSelectors() {
  const selY = document.getElementById('sel-year');
  const selM = document.getElementById('sel-month');
  const ymWrap = document.getElementById('ym-wrap');
  const wkLbl  = document.getElementById('week-label');
  if (!selY||!selM||!ymWrap||!wkLbl) return;
  if (curView === 'month') {
    ymWrap.style.display='flex'; wkLbl.style.display='none';
    if (selY.options.length) selY.value = curDate.getFullYear();
    selM.value = curDate.getMonth();
  } else {
    ymWrap.style.display='none'; wkLbl.style.display='block';
    const ws=weekStart(curDate), we=new Date(ws); we.setDate(ws.getDate()+6);
    wkLbl.textContent = curDate.getFullYear()+'년 '+(ws.getMonth()+1)+'/'+ws.getDate()+' – '+(we.getMonth()+1)+'/'+we.getDate();
  }
}

window.jumpYM = () => {
  const y = parseInt(document.getElementById('sel-year').value,10);
  const m = parseInt(document.getElementById('sel-month').value,10);
  curDate = new Date(y,m,1); render();
};
window.nav = dir => {
  if (curView==='month') {
    let y=curDate.getFullYear(), m=curDate.getMonth()+dir;
    if (m<0){y--;m=11;} if(m>11){y++;m=0;}
    if(y<MIN_YEAR||y>MAX_YEAR)return;
    curDate=new Date(y,m,1);
  } else {
    const next=new Date(curDate); next.setDate(next.getDate()+dir*7);
    if(next.getFullYear()<MIN_YEAR||next.getFullYear()>MAX_YEAR)return;
    curDate=next;
  }
  render();
};
window.goToday = () => { curDate=new Date(); render(); };
window.setView = v => {
  curView=v;
  document.getElementById('mv').style.display = (v==='month')?'':'none';
  document.getElementById('wv').style.display = (v==='week')?'':'none';
  ['vt-month','vt-week','mvt-month','mvt-week'].forEach(id => {
    const el=document.getElementById(id); if(!el)return;
    const isMo=id.includes('month');
    el.classList.toggle('on', isMo ? v==='month' : v==='week');
  });
  render();
};

/* ─────────────────────────────────
   Render
───────────────────────────────── */
function render() {
  syncSelectors();
  if (curView==='month') renderMonth(); else renderWeek();
}

function renderMonth() {
  const grid = document.getElementById('month-grid');
  const today = new Date();
  const y=curDate.getFullYear(), mo=curDate.getMonth();
  const first=new Date(y,mo,1), last=new Date(y,mo+1,0);
  const startDow=first.getDay();
  const total=Math.ceil((startDow+last.getDate())/7)*7;
  let html='';
  for(let i=0;i<total;i++){
    const offset=i-startDow, d=new Date(y,mo,1+offset), ds=dStr(d);
    const isOther=d.getMonth()!==mo, isToday=sameDay(d,today), dow=d.getDay();
    const dayEvs=events.filter(ev=>isVisible(ev)&&occursOn(ev,d))
      .sort((a,b)=>(a.startTime||'00:00')>(b.startTime||'00:00')?1:-1);
    let cls='dc'+(isOther?' other':'')+(dow===0?' sun':'')+(dow===6?' sat':'');
    const dnHtml=isToday?`<div class="dn"><span class="dn-today">${d.getDate()}</span></div>`:`<div class="dn">${d.getDate()}</div>`;
    const maxShow=3;
    let chips='';
    dayEvs.slice(0,maxShow).forEach(ev=>{
      chips+=`<div class="ev-chip" style="color:${getEvColor(ev)};background:${getEvBg(ev)};border-left:2px solid ${getEvColor(ev)}"
        onclick="event.stopPropagation();showPopup('${ev.id}',event)">${esc(ev.title)}</div>`;
    });
    const more=dayEvs.length-maxShow;
    if(more>0) chips+=`<div class="more-lbl">+${more}개</div>`;
    html+=`<div class="${cls}" onclick="openNewEventOnDate('${ds}')">${dnHtml}${chips}</div>`;
  }
  grid.innerHTML=html;
}

function renderWeek() {
  const today=new Date(), ws=weekStart(curDate);
  const days=[]; for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(ws.getDate()+i);days.push(d);}
  const WDAYS=['일','월','화','수','목','금','토'];
  // header
  let hh='<div class="wk-gut"></div>';
  days.forEach(d=>{
    const isT=sameDay(d,today);
    let cls='wk-dc'+(isT?' today':'')+(d.getDay()===0?' sun':'')+(d.getDay()===6?' sat':'');
    hh+=`<div class="${cls}"><div class="wdn">${WDAYS[d.getDay()]}</div><div class="wdd">${d.getDate()}</div></div>`;
  });
  document.getElementById('wk-head').innerHTML=hh;
  // all-day
  let adh='';
  days.forEach(d=>{
    let col='';
    events.filter(ev=>ev.allday&&isVisible(ev)&&occursOn(ev,d)).forEach(ev=>{
      col+=`<div class="ad-chip" style="color:${getEvColor(ev)};background:${getEvBg(ev)}"
        onclick="showPopup('${ev.id}',event)">${esc(ev.title)}</div>`;
    });
    adh+=`<div class="ad-col">${col}</div>`;
  });
  document.getElementById('ad-cols').innerHTML=adh;
  // time grid
  const totalH=24*HOUR_H;
  let tch='';
  for(let h=0;h<24;h++){
    const lbl=h===0?'':(h<12?h+'am':(h===12?'12pm':(h-12)+'pm'));
    tch+=`<div class="t-lbl" style="top:${h*HOUR_H}px">${lbl}</div>`;
  }
  const tc=document.getElementById('wk-tcol');
  tc.style.cssText=`height:${totalH}px;position:relative`;
  tc.innerHTML=tch;
  let dh='';
  days.forEach(d=>{
    const ds=dStr(d), isT=sameDay(d,today);
    let lines='';
    for(let h=0;h<24;h++){
      lines+=`<div class="h-line" style="top:${h*HOUR_H}px"></div><div class="h-half" style="top:${h*HOUR_H+HOUR_H/2}px"></div>`;
    }
    let now='';
    if(isT){
      const n=new Date();
      const nowTop=Math.round(((n.getHours()*60+n.getMinutes())/(24*60))*totalH);
      now=`<div class="now-line" style="top:${nowTop}px"><div class="now-dot"></div></div>`;
    }
    let evh='';
    events.filter(ev=>!ev.allday&&isVisible(ev)&&occursOn(ev,d)).forEach(ev=>{
      const st=ev.startTime||'00:00',et=ev.endTime||'01:00';
      const [sh,sm]=st.split(':').map(Number),[eh,em]=et.split(':').map(Number);
      const topPx=Math.round(((sh*60+sm)/(24*60))*totalH);
      const botPx=Math.round(((eh*60+em)/(24*60))*totalH);
      const hPx=Math.max(24,botPx-topPx);
      const mem=getMember(ev.memberId);
      evh+=`<div class="wk-ev" style="top:${topPx}px;height:${hPx}px;background:${getEvBg(ev)};border-left-color:${getEvColor(ev)};color:${getEvColor(ev)}"
        onclick="event.stopPropagation();showPopup('${ev.id}',event)">
        <div class="wk-ev-title">${esc(ev.title)}</div>
        ${hPx>32?`<div class="wk-ev-time">${st}${mem?' · '+esc(mem.name):''}</div>`:''}
      </div>`;
    });
    dh+=`<div class="wk-lane${isT?' today-bg':''}" style="height:${totalH}px;position:relative" data-date="${ds}">${lines}${now}${evh}</div>`;
  });
  document.getElementById('wk-days').innerHTML=dh;
  const body=document.getElementById('wk-body');
  if(!body._scrolled){body.scrollTop=Math.max(0,(new Date().getHours()-1)*HOUR_H);body._scrolled=true;}
}

/* ─────────────────────────────────
   Popup
───────────────────────────────── */
window.showPopup = (id, e) => {
  const ev=events.find(x=>x.id===id); if(!ev)return;
  popupId=id;
  const col=getEvColor(ev), mem=getMember(ev.memberId), cat=CATS[ev.cat];
  document.getElementById('pp-bar').style.background=col;
  document.getElementById('pp-title').textContent=ev.title||'';
  let dateStr=(ev.startDate||'').replace(/-/g,'/');
  if(ev.endDate&&ev.endDate!==ev.startDate) dateStr+=' ~ '+ev.endDate.replace(/-/g,'/');
  document.getElementById('pp-date').textContent=dateStr;
  const timeR=document.getElementById('pp-time-r');
  if(ev.allday){timeR.style.display='none';}
  else{timeR.style.display='';document.getElementById('pp-time').textContent=(ev.startTime||'')+' – '+(ev.endTime||'');}
  const memR=document.getElementById('pp-mem-r');
  if(mem){memR.style.display='';document.getElementById('pp-mem').textContent=mem.name;}else memR.style.display='none';
  const catR=document.getElementById('pp-cat-r');
  if(cat){catR.style.display='';document.getElementById('pp-cat').textContent=cat.i+' '+cat.l;}else catR.style.display='none';
  const repR=document.getElementById('pp-rep-r');
  if(ev.repeat&&ev.repeat!=='none'){repR.style.display='';document.getElementById('pp-rep').textContent=REP[ev.repeat]||'';}else repR.style.display='none';
  const memoR=document.getElementById('pp-memo-r');
  if(ev.memo){memoR.style.display='';document.getElementById('pp-memo').textContent=ev.memo;}else memoR.style.display='none';
  const popup=document.getElementById('popup');
  popup.classList.add('on');
  const vw=window.innerWidth,vh=window.innerHeight,pw=290,ph=260;
  let x=e.clientX+10,y=e.clientY+10;
  if(x+pw>vw)x=Math.max(8,e.clientX-pw-8);
  if(y+ph>vh)y=Math.max(8,vh-ph-8);
  if(x<8)x=8;
  popup.style.left=x+'px';popup.style.top=y+'px';
};
window.closePopup = () => { document.getElementById('popup').classList.remove('on'); popupId=null; };
window.editFromPopup = () => { if(popupId)editEvent(popupId); };
window.delFromPopup = () => {
  if(!popupId)return;
  if(!confirm('삭제하시겠습니까?'))return;
  remove(ref(db,`${ROOT}/events/${popupId}`));
  closePopup();
  toast('일정이 삭제되었습니다.','ok');
};

/* ─────────────────────────────────
   Event CRUD
───────────────────────────────── */
window.openNewEvent = () => {
  editId=null;
  document.getElementById('ev-modal-title').textContent='새 일정';
  document.getElementById('ev-del-btn').style.display='none';
  document.getElementById('ev-title').value='';
  document.getElementById('ev-cat').value='meeting';
  document.getElementById('ev-member').value='';
  const ds=dStr(curDate);
  document.getElementById('ev-sd').value=ds;
  document.getElementById('ev-ed').value=ds;
  document.getElementById('ev-allday').checked=false;
  document.getElementById('ev-st').value='09:00';
  document.getElementById('ev-et').value='10:00';
  document.getElementById('ev-repeat').value='none';
  document.getElementById('ev-memo').value='';
  document.getElementById('time-area').style.display='';
  document.getElementById('ev-modal').classList.add('on');
  setTimeout(()=>document.getElementById('ev-title').focus(),250);
};
window.openNewEventOnDate = ds => {
  openNewEvent();
  document.getElementById('ev-sd').value=ds;
  document.getElementById('ev-ed').value=ds;
};
function editEvent(id) {
  const ev=events.find(x=>x.id===id); if(!ev)return;
  editId=id;
  document.getElementById('ev-modal-title').textContent='일정 수정';
  document.getElementById('ev-del-btn').style.display='';
  document.getElementById('ev-title').value=ev.title||'';
  document.getElementById('ev-cat').value=ev.cat||'meeting';
  document.getElementById('ev-member').value=ev.memberId||'';
  document.getElementById('ev-sd').value=ev.startDate||'';
  document.getElementById('ev-ed').value=ev.endDate||ev.startDate||'';
  document.getElementById('ev-allday').checked=!!ev.allday;
  document.getElementById('ev-st').value=ev.startTime||'09:00';
  document.getElementById('ev-et').value=ev.endTime||'10:00';
  document.getElementById('ev-repeat').value=ev.repeat||'none';
  document.getElementById('ev-memo').value=ev.memo||'';
  document.getElementById('time-area').style.display=ev.allday?'none':'';
  closePopup();
  document.getElementById('ev-modal').classList.add('on');
}
window.toggleAllday = () => {
  document.getElementById('time-area').style.display = document.getElementById('ev-allday').checked?'none':'';
};
window.saveEvent = () => {
  const title=document.getElementById('ev-title').value.trim();
  if(!title){alert('제목을 입력하세요.');return;}
  const sd=document.getElementById('ev-sd').value;
  const ed=document.getElementById('ev-ed').value||sd;
  const ev={
    title, cat:document.getElementById('ev-cat').value,
    memberId:document.getElementById('ev-member').value,
    startDate:sd, endDate:ed,
    allday:document.getElementById('ev-allday').checked,
    startTime:document.getElementById('ev-st').value,
    endTime:document.getElementById('ev-et').value,
    repeat:document.getElementById('ev-repeat').value,
    memo:document.getElementById('ev-memo').value.trim(),
    updatedAt:Date.now()
  };
  if(editId){
    update(ref(db,`${ROOT}/events/${editId}`),ev);
    toast('일정이 수정되었습니다.','ok');
  }else{
    push(ref(db,`${ROOT}/events`),ev);
    toast('일정이 추가되었습니다.','ok');
  }
  closeEvModal();
};
window.closeEvModal = () => document.getElementById('ev-modal').classList.remove('on');
window.delCurEvent = () => {
  if(!editId)return;
  if(!confirm('삭제하시겠습니까?'))return;
  remove(ref(db,`${ROOT}/events/${editId}`));
  closeEvModal();
  toast('일정이 삭제되었습니다.','ok');
};

/* ─────────────────────────────────
   Member Management

window.openMemberModal = () => {
  document.getElementById('mem-name').value='';
  swIdx=0; renderSwatches(); renderMemManage();

window.closeMemModal = () => document.getElementById('mem-modal').classList.remove('on');

/* ─────────────────────────────────
   ICS Export
───────────────────────────────── */
function pad2(n){return String(n).padStart(2,'0');}
function toICSDate(ds,ts){
  if(!ds)return'';
  const p=ds.split('-');
  if(ts){const t=ts.split(':');return p[0]+p[1]+p[2]+'T'+t[0]+t[1]+'00';}
  return p[0]+p[1]+p[2];
}
window.exportICS = () => {
  if(!events.length){alert('내보낼 일정이 없습니다.');return;}
  const now=new Date();
  const stamp=toICSDate(dStr(now),pad2(now.getHours())+':'+pad2(now.getMinutes()));
  const lines=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//TeamScheduler//KR','CALSCALE:GREGORIAN','METHOD:PUBLISH'];
  events.forEach(ev=>{
    const cat=CATS[ev.cat];
    lines.push('BEGIN:VEVENT','UID:'+ev.id+'@teamscheduler','DTSTAMP:'+stamp);
    if(ev.allday){lines.push('DTSTART;VALUE=DATE:'+toICSDate(ev.startDate),'DTEND;VALUE=DATE:'+toICSDate(ev.endDate||ev.startDate));}
    else{lines.push('DTSTART:'+toICSDate(ev.startDate,ev.startTime),'DTEND:'+toICSDate(ev.endDate||ev.startDate,ev.endTime));}
    lines.push('SUMMARY:'+(ev.title||''));
    if(cat)lines.push('CATEGORIES:'+cat.l);
    if(ev.memo)lines.push('DESCRIPTION:'+(ev.memo||'').replace(/\n/g,'\\n'));
    const repMap={daily:'DAILY',weekly:'WEEKLY',monthly:'MONTHLY',yearly:'YEARLY'};
    if(ev.repeat&&repMap[ev.repeat])lines.push('RRULE:FREQ='+repMap[ev.repeat]);
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  const blob=new Blob([lines.join('\r\n')],{type:'text/calendar;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='팀스케줄_'+dStr(new Date())+'.ics';
  a.click();
};

/* ─────────────────────────────────
   Touch Swipe
───────────────────────────────── */
let tsX=0,tsY=0,tMoved=false;
const calEl=document.getElementById('cal');
calEl.addEventListener('touchstart',e=>{if(e.touches.length!==1)return;tsX=e.touches[0].clientX;tsY=e.touches[0].clientY;tMoved=false;},{passive:true});
calEl.addEventListener('touchmove',e=>{if(e.touches.length!==1)return;if(Math.abs(e.touches[0].clientX-tsX)>8||Math.abs(e.touches[0].clientY-tsY)>8)tMoved=true;},{passive:true});
calEl.addEventListener('touchend',e=>{
  if(e.changedTouches.length!==1)return;
  const dx=e.changedTouches[0].clientX-tsX, dy=Math.abs(e.changedTouches[0].clientY-tsY), adx=Math.abs(dx);
  if(adx>55&&dy<45){nav(dx<0?1:-1);return;}
  if(!tMoved&&curView==='week'){
    let lane=e.target;
    while(lane&&!lane.dataset.date)lane=lane.parentElement;
    if(lane&&lane.dataset.date)openNewEventOnDate(lane.dataset.date);
  }
},{passive:true});

/* ─────────────────────────────────
   Keyboard / Click outside
───────────────────────────────── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closePopup();closeEvModal();closeMemModal();closeSearch();}
});
document.addEventListener('click',e=>{
  const p=document.getElementById('popup');
  if(p.classList.contains('on')&&!p.contains(e.target))closePopup();
});

setInterval(()=>{if(curView==='week')renderWeek();},60000);
